name: E2E

# Full-stack Playwright run. Manual (workflow_dispatch) so a flaky boot never
# reddens main; the quality gate in ci.yaml is the always-on signal.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @ecommerce-orderflow/web exec playwright install --with-deps chromium

      - name: Web env
        run: cp apps/web/.env.example apps/web/.env.local

      - name: Start backend stack
        run: make up

      - name: Seed
        run: make seed

      - name: Run E2E
        run: pnpm --filter @ecommerce-orderflow/web test:e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Tear down
        if: always()
        run: make down
