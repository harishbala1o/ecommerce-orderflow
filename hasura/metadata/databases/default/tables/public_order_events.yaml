table:
  name: order_events
  schema: public
object_relationships:
  - name: order
    using:
      foreign_key_constraint_on: order_id
event_triggers:
  - name: order_event_created
    definition:
      enable_manual: false
      insert:
        columns: "*"
    retry_conf:
      num_retries: 3
      interval_sec: 10
      timeout_sec: 60
    webhook: http://workflow-service:3001/events/order-event
    headers:
      - name: x-action-secret
        value_from_env: ACTION_SECRET
