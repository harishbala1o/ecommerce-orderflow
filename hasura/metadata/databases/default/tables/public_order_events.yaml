table:
  name: order_events
  schema: public
object_relationships:
  - name: order
    using:
      foreign_key_constraint_on: order_id
select_permissions:
  - role: customer
    permission:
      columns: [id, order_id, from_status, to_status, action, actor_role, reason, created_at]
      filter:
        order:
          customer_id:
            _eq: X-Hasura-User-Id
  - role: ops
    permission:
      columns: [id, order_id, from_status, to_status, action, actor_id, actor_role, reason, correlation_id, created_at]
      filter: {}
  - role: admin
    permission:
      columns: [id, order_id, from_status, to_status, action, actor_id, actor_role, reason, correlation_id, created_at]
      filter: {}
event_triggers:
  - name: order_event_created
    definition:
      enable_manual: false
      insert:
        columns: "*"
    retry_conf:
      num_retries: 3
      interval_sec: 10
      timeout_sec: 60
    webhook: http://workflow-service:3001/events/order-event
    headers:
      - name: x-action-secret
        value_from_env: ACTION_SECRET
