table:
  name: orders
  schema: public
object_relationships:
  - name: customer
    using:
      foreign_key_constraint_on: customer_id
array_relationships:
  - name: items
    using:
      foreign_key_constraint_on:
        column: order_id
        table:
          name: order_items
          schema: public
  - name: events
    using:
      foreign_key_constraint_on:
        column: order_id
        table:
          name: order_events
          schema: public
select_permissions:
  - role: customer
    permission:
      columns: [id, customer_id, status, total_cents, created_at, updated_at]
      filter:
        customer_id:
          _eq: X-Hasura-User-Id
  - role: ops
    permission:
      columns: [id, customer_id, status, total_cents, created_at, updated_at]
      filter: {}
  - role: admin
    permission:
      columns: [id, customer_id, status, total_cents, created_at, updated_at]
      filter: {}
