table:
  name: order_items
  schema: public
object_relationships:
  - name: order
    using:
      foreign_key_constraint_on: order_id
  - name: product
    using:
      foreign_key_constraint_on: product_id
select_permissions:
  - role: customer
    permission:
      columns: [id, order_id, product_id, quantity, unit_price_cents]
      filter:
        order:
          customer_id:
            _eq: X-Hasura-User-Id
  - role: ops
    permission:
      columns: [id, order_id, product_id, quantity, unit_price_cents]
      filter: {}
  - role: admin
    permission:
      columns: [id, order_id, product_id, quantity, unit_price_cents]
      filter: {}
