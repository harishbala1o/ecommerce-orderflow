apiVersion: v1
kind: Service
metadata:
  name: {{ include "orderflow.name" . }}-workflow
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "orderflow.name" . }}-workflow
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orderflow.name" . }}-workflow
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  {{- if not .Values.workflowService.autoscaling.enabled }}
  replicas: {{ .Values.workflowService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "orderflow.name" . }}-workflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "orderflow.name" . }}-workflow
    spec:
      containers:
        - name: workflow-service
          image: {{ .Values.images.workflowService }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: postgres-password }
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_URL
              value: {{ include "orderflow.databaseUrl" . | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: database-url }
            {{- end }}
            - name: ACTION_SECRET
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: action-secret }
            - name: PORT
              value: "3001"
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.workflowService.resources | nindent 12 }}
{{- if .Values.workflowService.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "orderflow.name" . }}-workflow
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "orderflow.name" . }}-workflow
  minReplicas: {{ .Values.workflowService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.workflowService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.workflowService.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.workflowService.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "orderflow.name" . }}-workflow
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "orderflow.name" . }}-workflow
  policyTypes: [Ingress]
  ingress:
    # Only Hasura may reach the workflow service (Actions + Event Triggers).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "orderflow.name" . }}-hasura
      ports:
        - protocol: TCP
          port: 3001
{{- end }}
