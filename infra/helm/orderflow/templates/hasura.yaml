apiVersion: v1
kind: Service
metadata:
  name: {{ include "orderflow.name" . }}-hasura
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "orderflow.name" . }}-hasura
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orderflow.name" . }}-hasura
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.hasura.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "orderflow.name" . }}-hasura
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "orderflow.name" . }}-hasura
    spec:
      containers:
        - name: hasura
          image: {{ .Values.images.hasura }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "orderflow.secretName" . }}
                  key: postgres-password
            {{- if .Values.postgres.enabled }}
            - name: PG_DATABASE_URL
              value: {{ include "orderflow.databaseUrl" . | quote }}
            - name: HASURA_GRAPHQL_DATABASE_URL
              value: {{ include "orderflow.databaseUrl" . | quote }}
            {{- else }}
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: database-url }
            - name: HASURA_GRAPHQL_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: database-url }
            {{- end }}
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: admin-secret }
            - name: ACTION_SECRET
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: action-secret }
            - name: HASURA_GRAPHQL_ENABLE_CONSOLE
              value: {{ .Values.hasura.enableConsole | quote }}
            - name: HASURA_GRAPHQL_DEV_MODE
              value: {{ .Values.hasura.devMode | quote }}
            - name: HASURA_GRAPHQL_CORS_DOMAIN
              value: {{ .Values.hasura.corsDomain | quote }}
            {{- if .Values.hasura.jwt.enabled }}
            - name: HASURA_GRAPHQL_JWT_SECRET
              value: >-
                {"jwk_url":"http://{{ include "orderflow.name" . }}-keycloak:8080/realms/ecommerce-orderflow/protocol/openid-connect/certs",
                 "claims_map":{
                   "x-hasura-allowed-roles":{"path":"$.realm_access.roles"},
                   "x-hasura-default-role":{"path":"$.hasura_default_role"},
                   "x-hasura-user-id":{"path":"$.sub"}}}
            {{- end }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.hasura.resources | nindent 12 }}
