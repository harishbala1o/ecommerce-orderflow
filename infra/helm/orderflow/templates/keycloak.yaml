{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orderflow.name" . }}-keycloak-realm
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
data:
  realm-ecommerce-orderflow.json: |-
    {{- .Files.Get "files/realm-ecommerce-orderflow.json" | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orderflow.name" . }}-keycloak
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "orderflow.name" . }}-keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orderflow.name" . }}-keycloak
  labels:
    {{- include "orderflow.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "orderflow.name" . }}-keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "orderflow.name" . }}-keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.images.keycloak }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["start-dev", "--import-realm"]
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "orderflow.secretName" . }}, key: keycloak-admin-password }
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /realms/ecommerce-orderflow, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: {{ include "orderflow.name" . }}-keycloak-realm
{{- end }}
